<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Blue Wave · Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="landingPage">
    <div class="banner-container">
        <img src="https://i.ibb.co/KxtD3C2w/banner-world-cup-app.png" alt="Blue Wave 2026">
    </div>
    
    <div class="premium-sponsor-area">
        <div class="premium-title">⭐ TOGETHER FOR CURAÇAO ⭐</div>
        <div id="premiumContainer" class="premium-grid"></div>
    </div>
    
    <button class="enter-btn" id="enterAppBtn">🎁 VIEW DAILY PROMOS</button>
</div>

<div id="appWrapper">
    <div class="app-header">
        <h2>🏆 PREDICTION LEADERBOARD</h2>
        <p>Just for fun - bragging rights only!</p>
    </div>
    
   <div class="card">
    <div class="card-title">🎁 TODAY'S ACTIVE PROMOS</div>
    <div id="promoList" class="loading">Loading promos...</div>
</div>
    
    <div class="prediction-form">
        <div style="font-weight:800;">🎯 TODAY'S PREDICTION</div>
        <div style="font-size:14px; margin:6px 0 0;">Germany 🆚 Curaçao (June 15, 18:00)</div>
        <div class="radio-group">
            <label><input type="radio" name="matchPick" value="Germany"> Germany</label>
            <label><input type="radio" name="matchPick" value="Curaçao"> Curaçao 🇨🇼</label>
            <label><input type="radio" name="matchPick" value="Draw"> Draw</label>
        </div>
        <input type="text" id="fanName" placeholder="Your name / nickname" style="width:100%; padding:12px; border-radius:60px; border:1px solid #ccc; margin-bottom:12px;">
        <button class="submit-pred" id="submitPredictionBtn">SUBMIT PREDICTION</button>
    </div>
    
    <div class="card">
        <div class="card-title">📢 OUR SUPPORTERS</div>
        <div id="goldContainer" class="gold-grid"></div>
    </div>
    
    <div class="card">
        <div class="card-title">🌟 SHOUTOUTS</div>
        <div class="silver-frame">
            <div id="silverScroller" class="silver-scroll"></div>
        </div>
    </div>
    
    <div class="chain-nav">
        <a href="index.html">⚽ Matches</a>
        <a href="donate.html">💝 Donate</a>
        <a href="promotions.html">📢 Promotions</a>
    </div>
    
    <button class="share-btn" id="shareAppBtn">📲 SHARE THIS APP</button>
</div>

<script src="sponsors.js"></script>
<script>
const BLUEWAVE_API_URL = "https://script.google.com/macros/s/AKfycbzuh9dMshkt95gn7BX4oXMKBttAvGN-lYPS_wX0QeQaV5Bt_m_GJ-xLqg9MbEkQpGwe/exec";

function getCurrentUnit() {
  const params = new URLSearchParams(window.location.search);
  return params.get("unit") || "CUR1";
}

async function loadPromos() {
  const unit = getCurrentUnit();
  const container =
    document.getElementById("promoList") ||
    document.getElementById("promosList") ||
    document.getElementById("dailyPromoList") ||
    document.querySelector(".promo-list");

  if (!container) return;

  container.innerHTML = "Loading promos...";

  try {
    const response = await fetch(BLUEWAVE_API_URL);
    const data = await response.json();

    const promos = (data.promos || [])
      .filter(p => String(p.unitId).trim() === unit)
      .filter(p => p.Active === true || String(p.Active).toLowerCase() === "true");

    if (!promos.length) {
      container.innerHTML = "No active promos yet.";
      return;
    }

    container.innerHTML = promos.reverse().map(p => `
      <div class="promo-card" style="background:white;padding:15px;border-radius:14px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.08);">
        <h3>🎁 ${p.SponsorName || "Sponsor"}</h3>
        <p>${p.Message || ""}</p>
        <p><small>Valid until: ${p.ValidUntil || "Today"}</small></p>
        ${p.Link ? `<a href="${formatLink(p.Link)}" target="_blank" style="display:block;background:#0066cc;color:white;text-align:center;padding:12px;border-radius:10px;text-decoration:none;font-weight:bold;">WhatsApp</a>` : ""}
      </div>
    `).join("");

  } catch (err) {
    container.innerHTML = "Could not load promos.";
  }
}
function enterApp() {
  document.getElementById("landingPage").style.display = "none";
  document.getElementById("appWrapper").style.display = "block";
  loadPromos();
}
function formatLink(link) {
  if (!link) return "";
  if (link.startsWith("http")) return link;
  if (link.startsWith("wa.me")) return "https://" + link;
  return link;
}

function shareApp() {
  if (navigator.share) {
    navigator.share({
      title: 'Blue Wave Daily Promos',
      text: '🎁 Check today’s Blue Wave promos!',
      url: window.location.href
    }).catch(() => {
      navigator.clipboard.writeText(window.location.href);
      alert('Link copied!');
    });
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert('🔗 Link copied! Share: ' + window.location.href);
  }
}

document.addEventListener("DOMContentLoaded", () => {

  if (typeof renderPremium === "function")
    renderPremium("premiumContainer");

  if (typeof renderGold === "function")
    renderGold("goldContainer");

  if (typeof renderSilver === "function")
    renderSilver("silverScroller");

  const enterBtn = document.getElementById("enterAppBtn");
  if (enterBtn) enterBtn.addEventListener("click", enterApp);

  const shareBtn = document.getElementById("shareAppBtn");
  if (shareBtn) shareBtn.addEventListener("click", shareApp);

});
</script>
</body>
</html>
