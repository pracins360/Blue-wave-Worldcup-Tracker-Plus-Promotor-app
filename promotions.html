<!DOCTYPE html> <html lang="en"> 
  <head> <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, 
      user-scalable=yes"> <title>Blue Wave · Leaderboard</title> 
    <link rel="stylesheet" href="style.css"> </head> 
  <body>

<div id="appWrapper" style="display:block;">
  <div class="app-header">
    <h2>🎁 BLUE WAVE DAILY PROMOS</h2>
    <p>Short daily offers from local supporters</p>
  </div>

  <div class="card">
    <div class="card-title">🎁 TODAY'S ACTIVE PROMOS</div>
    <div id="promoList" class="loading">Loading promos...</div>
  </div>

  <div class="chain-nav">
    <a href="index.html?unit=CUR1">🏠 Main App</a>
  </div>

  <button class="share-btn" id="shareAppBtn">📲 SHARE PROMOS</button>
</div>

<script>
const BLUEWAVE_API_URL = "https://script.google.com/macros/s/AKfycbzuh9dMshkt95gn7BX4oXMKBttAvGN-lYPS_wX0QeQaV5Bt_m_GJ-xLqg9MbEkQpGwe/exec";

function getCurrentUnit() {
  const params = new URLSearchParams(window.location.search);
  return params.get("unit") || "CUR1";
}

function formatLink(link) {
  if (!link) return "";
  if (link.startsWith("http")) return link;
  if (link.startsWith("wa.me")) return "https://" + link;
  return link;
}

async function loadPromos() {
  const unit = getCurrentUnit();
  const container = document.getElementById("promoList");

  container.innerHTML = "Loading promos...";

  try {
    const response = await fetch(BLUEWAVE_API_URL);
    const data = await response.json();

    const promos = (data.promos || [])
      .filter(p => String(p.unitId).trim().toUpperCase() === unit.toUpperCase());

    if (!promos.length) {
      container.innerHTML = "No active promos yet.";
      return;
    }

    container.innerHTML = promos.reverse().map(p => `
      <div style="background:white;padding:15px;border-radius:14px;margin:12px 0;box-shadow:0 2px 8px rgba(0,0,0,.08);">
        <h3>🎁 ${p.SponsorName || "Sponsor"}</h3>
        <p>${p.Message || ""}</p>
        <p><small>Valid until: ${p.ValidUntil || "Today"}</small></p>
        ${p.Link ? `<a href="${formatLink(p.Link)}" target="_blank" style="display:block;background:#0066cc;color:white;text-align:center;padding:12px;border-radius:10px;text-decoration:none;font-weight:bold;">WhatsApp</a>` : ""}
      </div>
    `).join("");

  } catch (err) {
    container.innerHTML = "Could not load promos.";
  }
}

function shareApp() {
  if (navigator.share) {
    navigator.share({
      title: "Blue Wave Daily Promos",
      text: "🎁 Check today’s Blue Wave promos!",
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(window.location.href);
    alert("Link copied!");
  }
}

document.addEventListener("DOMContentLoaded", () => {
  loadPromos();

  const shareBtn = document.getElementById("shareAppBtn");
  if (shareBtn) shareBtn.addEventListener("click", shareApp);
});
</script>

</body>
